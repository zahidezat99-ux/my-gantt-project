name: Validate & Auto-Fix SVG Usernames

on:
  push:
    paths:
      - '**/*.svg'
  pull_request:
    paths:
      - '**/*.svg'

jobs:
  svg-username-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run username auto-fix script
        run: python3 fix_svg_usernames_bulk_buffers.py
